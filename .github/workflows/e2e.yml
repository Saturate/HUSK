name: E2E

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "LICENSE"
      - "demo.gif"
      - "website/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "LICENSE"
      - "demo.gif"
      - "website/**"

jobs:
  e2e:
    name: E2E
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile && cd server/ui && bun install --frozen-lockfile

      - name: Build UI
        run: cd server && bun run build:ui

      - name: Build CLI
        run: cd cli && bun install --frozen-lockfile && bun run build

      - name: Install CLI globally
        run: cd cli && npm install -g .

      - name: Test CLI basics
        run: |
          husk -v
          husk --help
          husk status
          husk sync --dry-run

      - name: Start server
        run: |
          cd server
          HUSK_OTLP_AUTH=false HUSK_STORAGE=sqlite-vec HUSK_EMBEDDINGS=transformers bun run src/index.ts &
          for i in $(seq 1 30); do curl -sf http://localhost:3000/health > /dev/null 2>&1 && break; sleep 1; done

      - name: Setup admin
        id: setup
        run: |
          curl -sf -X POST http://localhost:3000/setup \
            -H "Content-Type: application/json" \
            -d '{"username":"admin","password":"husk-e2e-admin"}'

          KEY=$(curl -sf -X POST http://localhost:3000/api/keys \
            -b <(curl -sf -c - http://localhost:3000/api/auth/login \
              -H "Content-Type: application/json" \
              -d '{"username":"admin","password":"husk-e2e-admin"}') \
            -H "Content-Type: application/json" \
            -d '{"label":"e2e"}' | grep -o '"key":"[^"]*"' | cut -d'"' -f4)

          echo "api_key=$KEY" >> "$GITHUB_OUTPUT"

      - name: Run E2E tests
        env:
          HUSK_URL: http://localhost:3000
          HUSK_API_KEY: ${{ steps.setup.outputs.api_key }}
        run: bash cli/test/e2e.sh remote
