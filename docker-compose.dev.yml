# Dev: just Qdrant + Ollama, run the server locally with `bun run dev`
# Usage: docker compose -f docker-compose.dev.yml up -d
services:
  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 3s
      start_period: 5s

  ollama-pull:
    image: curlimages/curl:latest
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    entrypoint: ["sh", "-c", "curl -fSL http://ollama:11434/api/pull -d '{\"name\":\"nomic-embed-text\",\"stream\":false}'"]

volumes:
  qdrant_data:
  ollama_data:
