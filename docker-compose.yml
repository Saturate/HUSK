# Production: full stack - HUSK + Qdrant + Ollama
# Usage: docker compose up -d
services:
  husk:
    image: ghcr.io/saturate/husk:edge
    # Or build from source:
    # build: .
    ports:
      - "${HUSK_PORT:-3000}:3000"
    volumes:
      - husk_data:/data
    environment:
      - HUSK_DB_PATH=/data/husk.db
      - HUSK_PORT=3000
      - HUSK_JWT_SECRET=${HUSK_JWT_SECRET:-}
      - HUSK_STORAGE=qdrant
      - HUSK_STORAGE_URL=http://qdrant:6333
      - HUSK_EMBEDDINGS=ollama
      - HUSK_EMBED_URL=http://ollama:11434
      - HUSK_EMBED_MODEL=${HUSK_EMBED_MODEL:-nomic-embed-text}
      - HUSK_EMBED_DIMENSIONS=${HUSK_EMBED_DIMENSIONS:-768}
    depends_on:
      qdrant:
        condition: service_started
      ollama:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bun", "-e", "const r = await fetch('http://localhost:3000/health'); if (!r.ok) process.exit(1)"]
      interval: 30s
      timeout: 3s
      start_period: 5s

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 3s
      start_period: 5s

  # Pulls the embedding model on first run, then exits
  ollama-pull:
    image: curlimages/curl:latest
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    entrypoint: ["sh", "-c", "curl -fSL http://ollama:11434/api/pull -d '{\"name\":\"${HUSK_EMBED_MODEL:-nomic-embed-text}\",\"stream\":false}'"]

volumes:
  husk_data:
  qdrant_data:
  ollama_data:
