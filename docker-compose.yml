# Production: full stack — YAMS + Qdrant + Ollama
# Usage: docker compose up -d
services:
  yams:
    image: ghcr.io/saturate/yams:latest
    # Or build from source:
    # build: .
    ports:
      - "${YAMS_PORT:-3000}:3000"
    volumes:
      - yams_data:/data
    environment:
      - YAMS_DB_PATH=/data/yams.db
      - YAMS_PORT=3000
      - YAMS_JWT_SECRET=${YAMS_JWT_SECRET:-}
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-nomic-embed-text}
      - EMBEDDING_DIMENSIONS=${EMBEDDING_DIMENSIONS:-768}
    depends_on:
      qdrant:
        condition: service_started
      ollama:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bun", "-e", "const r = await fetch('http://localhost:3000/health'); if (!r.ok) process.exit(1)"]
      interval: 30s
      timeout: 3s
      start_period: 5s

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 3s
      start_period: 5s

  # Pulls the embedding model on first run, then exits
  ollama-pull:
    image: curlimages/curl:latest
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    entrypoint: ["sh", "-c", "curl -fSL http://ollama:11434/api/pull -d '{\"name\":\"${OLLAMA_MODEL:-nomic-embed-text}\",\"stream\":false}'"]

volumes:
  yams_data:
  qdrant_data:
  ollama_data:
